<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BudgetBuddy — Giriş & Kayıt</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="giris.css"/>
</head>
<body>

<div id="cur"></div><div id="cur-ring"></div>
<div class="bg-grid"></div>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>

<div class="auth-wrap">

  <div class="auth-left">
    <a href="index.html" class="back-link">← Ana Sayfa</a>
    <div class="mascot-wrap">
      <div class="mascot">
        <div class="mascot-face">
          <div class="ear left"></div>
          <div class="ear right"></div>
          <div class="eyes">
            <div class="eye" id="eye-left"><div class="pupil" id="pupil-l"></div><div class="eye-shine"></div></div>
            <div class="eye" id="eye-right"><div class="pupil" id="pupil-r"></div><div class="eye-shine"></div></div>
          </div>
          <div class="mouth" id="mouth"></div>
        </div>
      </div>
      <div class="speech-bubble" id="speech">Hoş geldin! Seni bekliyordum.</div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card" id="login-card">
      <div class="badge">BudgetBuddy Pro</div>
      <h1>Tekrar Merhaba!</h1>
      <p class="subtitle">Finansal asistanına erişmek için giriş yap.</p>

      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="login-user" placeholder="buddy_123">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doLogin()">Sisteme Gir →</button>
      <p class="switch-text">Hesabın yok mu? <span onclick="toggleAuth()">Kayıt Ol</span></p>
    </div>

    <div class="auth-card hide" id="reg-card">
      <div class="badge green">Yeni Hesap</div>
      <h1>Aramıza Katıl!</h1>
      <p class="subtitle">Kendi finansal yol haritanı oluşturmaya başla.</p>

      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="reg-user" placeholder="buddy_123">
      </div>
      <div class="form-group">
        <label>E-Posta</label>
        <input type="email" id="reg-email" placeholder="merhaba@budd.y">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="reg-pass" placeholder="Güçlü bir şifre seç">
      </div>
      <button class="btn-primary" onclick="doRegister()">Hesap Oluştur ✓</button>
      <p class="switch-text">Zaten üye misin? <span onclick="toggleAuth()">Giriş Yap</span></p>
    </div>
  </div>

</div>

<script src="giris.js"></script>
</body>
</html>
